<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

.form-box{

width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);

}

.form-box h2{

text-align:center;
margin-bottom:20px;

}

.form-box input{

width:100%;
padding:12px;
margin:10px 0;

}

.form-box button{

width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

.form-box p{

text-align:center;
margin-top:20px;

}

</style>

</head>

<body>

<div class="form-box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="loginUser()">

Login

</button>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

<script>

async function loginUser(){

const user={

email:document.getElementById("email").value,

password:document.getElementById("password").value

};

if(!user.email || !user.password){

alert("Please fill all fields");

return;

}

const response=await fetch("/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(user)

});

const data=await response.json();

if(data.success){

alert("Login Successful");
localStorage.setItem(

"username",

data.user.name

);

localStorage.setItem(

"email",

data.user.email

);

window.location="index.html";

}else{

alert("Invalid Email or Password");

}

}

</script>

</body>
</html>
